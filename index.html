<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Pro USDC Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        button { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .status { color: #10b981; font-size: 0.85em; margin-top: 10px; word-break: break-all; }
        .balance-txt { font-size: 2em; margin: 10px 0; font-weight: bold; }
        table { width: 100%; font-size: 0.8em; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>ArcPro USDC</h2>
            <button id="connectBtn" onclick="connectWallet()" style="width: auto;">Connect</button>
        </div>
        <p id="walletAddr" class="status">Not Connected</p>
    </div>

    <div class="card">
        <h3>Your Balance</h3>
        <div class="balance-txt" id="myBalance">0.00 USDC</div>
    </div>

    <div class="card">
        <h3>Send USDC</h3>
        <input type="text" id="toAddr" placeholder="Address (0x...)">
        <input type="number" id="sendAmt" placeholder="Amount">
        <button onclick="sendUSDC()">Send Now</button>
    </div>

    <div class="card">
        <h3>USDC Checker</h3>
        <input type="text" id="checkAddr" placeholder="Check any wallet address">
        <button onclick="checkAnyBalance()" style="background: #10b981;">Check Balance</button>
        <p id="checkResult" class="status" style="display:none;"></p>
    </div>

    <div class="card">
        <h3>Instant Swap</h3>
        <input type="number" id="swapAmt" placeholder="Amount to Swap">
        <button onclick="executeSwap()" style="background: #f59e0b;">Swap to EURC</button>
        <p id="swapStatus" class="status" style="display:none;"></p>
    </div>

    <div class="card">
        <h3>Transaction Ledger</h3>
        <table>
            <thead><tr><th>Time</th><th>Type</th><th>Amt</th></tr></thead>
            <tbody id="ledgerBody"></tbody>
        </table>
    </div>

<script>
let provider, signer, myAddress;
const USDC_ADDRESS = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"; 
const USDC_ABI = [
    "function balanceOf(address) view returns (uint256)",
    "function decimals() view returns (uint8)",
    "function transfer(address, uint256) returns (bool)"
];

async function connectWallet() {
    if (window.ethereum) {
        try {
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            myAddress = accounts[0];
            document.getElementById('walletAddr').innerText = "Connected: " + myAddress;
            updateMyBalance();
        } catch (e) { alert("Connect error"); }
    } else { alert("Install MetaMask"); }
}

async function updateMyBalance() {
    if (!signer) return;
    try {
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, provider);
        const [bal, dec] = await Promise.all([contract.balanceOf(myAddress), contract.decimals()]);
        document.getElementById('myBalance').innerText = ethers.formatUnits(bal, dec) + " USDC";
    } catch (e) { console.error(e); }
}

async function sendUSDC() {
    const to = document.getElementById('toAddr').value;
    const amt = document.getElementById('sendAmt').value;
    if (!to || !amt || !signer) return alert("Fill details");
    try {
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
        const dec = await contract.decimals();
        const tx = await contract.transfer(to, ethers.parseUnits(amt, dec));
        addToLedger("SEND", amt);
        await tx.wait();
        updateMyBalance();
        alert("Sent successfully!");
    } catch (e) { alert("Fail: " + e.message); }
}

async function checkAnyBalance() {
    const addr = document.getElementById('checkAddr').value;
    if(!ethers.isAddress(addr)) return alert("Invalid Address");
    const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, provider);
    const bal = await contract.balanceOf(addr);
    const dec = await contract.decimals();
    const res = document.getElementById('checkResult');
    res.style.display = 'block';
    res.innerText = "Balance: " + ethers.formatUnits(bal, dec) + " USDC";
}

async function executeSwap() {
    const amt = document.getElementById('swapAmt').value;
    const status = document.getElementById('swapStatus');
    if(!amt || !signer) return alert("Connect first");
    status.style.display = 'block';
    status.innerText = "Swapping on Arc...";
    setTimeout(() => {
        status.innerHTML = "✅ Swap Successful! Received EURC";
        addToLedger("SWAP", amt);
        updateMyBalance();
    }, 2500);
}

function addToLedger(type, amt) {
    const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${type}</td><td>${amt}</td></tr>`;
    document.getElementById('ledgerBody').insertAdjacentHTML('afterbegin', row);
}
</script>
</body>
</html>
