<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Pro Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #050816; --card: #0d1324; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app { width: 100%; max-width: 440px; padding: 20px; }
        .card { background: var(--card); border-radius: 24px; padding: 24px; border: 1px solid #1f2d52; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-connect { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 14px; font-weight: 700; cursor: pointer; }
        .balance-val { font-size: 2.2rem; font-weight: 800; text-align: center; margin: 10px 0; word-break: break-all; }
        .label { color: #8ea2ff; font-size: 0.8rem; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 16px; border: 1px solid #1f2d52; background: #050816; color: white; outline: none; box-sizing: border-box; }
        .btn-send { background: #3154ff; color: white; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .status { text-align: center; font-size: 0.8rem; margin-top: 15px; color: #22c55e; word-break: break-all; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h2 style="margin:0; font-style: italic;">ArcPro</h2>
        <button class="btn-connect" id="cnBtn" onclick="connect()">Connect Wallet</button>
    </div>

    <div class="card">
        <div class="label">Actual USDC Balance</div>
        <div class="balance-val" id="balText">0.00</div>
        <div style="text-align:center; margin-bottom: 10px;"><span style="background:#1e293b; padding:4px 12px; border-radius:8px; font-size:0.7rem; color:var(--primary)">NATIVE USDC</span></div>
        <div class="label" style="font-size: 0.7rem;">Gas Balance: <span id="gasText" style="color:#fff;">0.00 ARC</span></div>
        <div class="status" id="addrText" style="color:#94a3b8">Linked: Not Connected</div>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px 0">Transfer Assets</h4>
        <input type="text" id="to" placeholder="Recipient Address (0x...)">
        <input type="number" id="amt" placeholder="Amount (USDC)">
        <button class="btn-send" onclick="send()">Process Transfer</button>
        <div id="stText" class="status" style="color: #ef4444;"></div>
    </div>
</div>

<script>
let p, s, addr;
let tokenDecimals = 18;
const USDC = "0x3600000000000000000000000000000000000000"; // Target Contract
const ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)", "function transfer(address, uint256) returns (bool)"];

async function connect() {
    if (!window.ethereum) return alert("Brave ya MetaMask wallet ka use karein.");
    p = new ethers.BrowserProvider(window.ethereum);
    const accs = await p.send("eth_requestAccounts", []);
    s = await p.getSigner();
    addr = accs[0];
    
    document.getElementById('cnBtn').innerText = "Connected";
    document.getElementById('addrText').innerText = "Linked: " + addr.slice(0,6) + "..." + addr.slice(-4);
    
    // Connect hote hi real-time balance load hoga
    await getBal();
}

async function getBal() {
    try {
        const c = new ethers.Contract(USDC, ABI, p);
        
        try {
            tokenDecimals = await c.decimals();
        } catch(e) {
            tokenDecimals = 18; // Fallback security alignment
        }

        const [rawBalance, gasBalance] = await Promise.all([
            c.balanceOf(addr),
            p.getBalance(addr)
        ]);

        // Wallet ke exact mathematical formats ko UI par screen karna
        const formattedUSDC = ethers.formatUnits(rawBalance, tokenDecimals);
        document.getElementById('balText').innerText = parseFloat(formattedUSDC).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4});
        document.getElementById('gasText').innerText = parseFloat(ethers.formatEther(gasBalance)).toFixed(4) + " ARC";
    } catch (e) {
        console.error("Balance fetch error:", e);
    }
}

async function send() {
    const target = document.getElementById('to').value;
    const val = document.getElementById('amt').value;
    if (!s || !target || !val) return alert("Please fill all details and connect wallet.");
    
    const stDisplay = document.getElementById('stText');
    try {
        stDisplay.style.color = "#3b82f6";
        stDisplay.innerText = "Requesting Brave Wallet authorization...";

        const c = new ethers.Contract(USDC, ABI, s);
        const parsedAmount = ethers.parseUnits(val.toString(), tokenDecimals);

        // Standard Ethers call jo wallet safety simulators ke sath transparently map hota hai
        const tx = await c.transfer(target, parsedAmount);

        stDisplay.innerText = "Transaction broadcasting onto Arc network...";
        await tx.wait();
        
        stDisplay.style.color = "#22c55e";
        stDisplay.innerText = "Success! Transaction confirmed.";
        await getBal();
    } catch (e) { 
        console.error(e);
        stDisplay.style.color = "#ef4444";
        // Agar user reject karega ya node execute nahi karega toh accurate notification handle hoga
        stDisplay.innerText = e.message.includes("rejected") ? "Transaction rejected by user." : "Simulation Failed: Check recipient contract structure.";
    }
}

window.addEventListener('load', () => { if(window.ethereum) connect(); });
</script>
</body>
</html>
