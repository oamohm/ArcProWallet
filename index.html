<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcPro Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background: #0b0f1a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #161e2d; padding: 20px; border-radius: 15px; border: 1px solid #2d3748; margin-bottom: 20px; }
        button { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        #myBalance { font-size: 2.5em; font-weight: bold; color: #3b82f6; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ArcPro USDC</h2>
        <button onclick="connectWallet()">Connect Wallet</button>
        <p id="walletAddr" style="font-size: 0.8em; color: #10b981; margin-top: 10px;">Not Linked</p>
    </div>
    <div class="card">
        <p>Balance</p>
        <div id="myBalance">0.00 USDC</div>
    </div>
<script>
let provider, signer, myAddress;
const USDC_ADDRESS = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174";
const USDC_ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"];

async function connectWallet() {
    if (window.ethereum) {
        provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        myAddress = accounts[0];
        document.getElementById('walletAddr').innerText = "Connected: " + myAddress;
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, provider);
        const [bal, dec] = await Promise.all([contract.balanceOf(myAddress), contract.decimals()]);
        document.getElementById('myBalance').innerText = ethers.formatUnits(bal, dec) + " USDC";
    } else { alert("Use MetaMask Browser"); }
}
</script>
</body>
</html>
