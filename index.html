<script>

let provider;
let signer;
let userAddress;

/* ARC TESTNET CONFIG */

const CHAIN_ID = "0xA86A";

/*
IMPORTANT:

Neeche wala contract address
ARC TESTNET ka REAL USDC address hona chahiye.

Abhi placeholder dala hai.

Agar official faucet/docs se
ARC USDC address mile
toh yahi replace karna.

*/

const USDC_ADDRESS =
"0xYourArcUSDCContractAddress";

/* ERC20 ABI */

const USDC_ABI = [

"function balanceOf(address owner) external view returns (uint256)",

"function transfer(address to,uint256 value) external returns (bool)",

"function decimals() external view returns (uint8)"

];

/* SWITCH ARC TESTNET */

async function switchNetwork(){

try{

await window.ethereum.request({

method:"wallet_switchEthereumChain",

params:[{
chainId: CHAIN_ID
}]

});

}catch(switchError){

/*
Agar network added nahi hai
toh automatic add karega
*/

if(switchError.code === 4902){

try{

await window.ethereum.request({

method:"wallet_addEthereumChain",

params:[{

chainId: CHAIN_ID,

chainName:"Arc Testnet",

nativeCurrency:{
name:"Arc",
symbol:"ARC",
decimals:18
},

rpcUrls:[
"https://rpc-testnet.arc.network"
],

blockExplorerUrls:[
"https://scan-testnet.arc.network"
]

}]

});

}catch(addError){

console.log(addError);

alert("Arc Testnet Add Failed");

}

}

}

}

/* CONNECT WALLET */

async function connectWallet(){

try{

if(!window.ethereum){

alert("Install MetaMask or Brave Wallet");

return;

}

await switchNetwork();

await window.ethereum.request({

method:"eth_requestAccounts"

});

provider =
new ethers.providers.Web3Provider(
window.ethereum
);

signer =
provider.getSigner();

userAddress =
await signer.getAddress();

document.getElementById(
"connectBtn"
).innerHTML =
userAddress.slice(0,6) +
"..." +
userAddress.slice(-4);

document.getElementById(
"connectBtn"
).style.background =
"#22c55e";

document.getElementById(
"walletAddress"
).innerHTML =
userAddress;

document.getElementById(
"networkStatus"
).innerHTML =
"Arc Testnet";

await loadBalance();

}catch(err){

console.log(err);

alert("Wallet Connection Failed");

}

}

/* LOAD USDC BALANCE */

async function loadBalance(){

try{

const contract =
new ethers.Contract(
USDC_ADDRESS,
USDC_ABI,
provider
);

const decimals =
await contract.decimals();

const rawBalance =
await contract.balanceOf(
userAddress
);

const balance =
ethers.utils.formatUnits(
rawBalance,
decimals
);

document.getElementById(
"balanceDisplay"
).innerHTML =
Number(balance).toFixed(2) +
" USDC";

}catch(err){

console.log(err);

document.getElementById(
"balanceDisplay"
).innerHTML =
"0.00 USDC";

}

}

/* SEND USDC */

async function sendUSDC(){

try{

if(!signer){

alert("Connect Wallet First");

return;

}

const recipient =
document.getElementById(
"recipient"
).value.trim();

const amount =
document.getElementById(
"amount"
).value.trim();

if(!ethers.utils.isAddress(recipient)){

alert("Invalid Address");

return;

}

if(Number(amount) <= 0){

alert("Invalid Amount");

return;

}

document.getElementById(
"status"
).innerHTML =
"Waiting for wallet confirmation...";

const contract =
new ethers.Contract(
USDC_ADDRESS,
USDC_ABI,
signer
);

const decimals =
await contract.decimals();

const parsedAmount =
ethers.utils.parseUnits(
amount,
decimals
);

const tx =
await contract.transfer(
recipient,
parsedAmount
);

document.getElementById(
"status"
).innerHTML =
"Transaction Pending...";

addTransaction(
amount,
recipient,
"pending",
tx.hash
);

await tx.wait();

document.getElementById(
"status"
).innerHTML =
"USDC Sent Successfully";

addTransaction(
amount,
recipient,
"success",
tx.hash
);

loadBalance();

}catch(err){

console.log(err);

document.getElementById(
"status"
).innerHTML =
"Transaction Failed";

addTransaction(
"0",
"",
"failed",
""
);

}

}

</script>
