<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Pro USDC Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        button { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .status { color: #10b981; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>ArcPro USDC</h2>
        <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
        <p id="walletAddr" class="status">Not Connected</p>
    </div>

    <div class="card">
        <h3>USDC Wallet</h3>
        <p>Your USDC Balance</p>
        <h1 id="myBalance">0.0000 USDC</h1>
    </div>

    <div class="card">
        <h3>Instant Swap</h3>
        <input type="number" id="swapAmt" placeholder="Amount to Swap">
        <button onclick="executeSwap()" style="background: #f59e0b;">Swap to EURC</button>
        <p id="swapStatus" style="display:none; margin-top:10px;"></p>
    </div>

<script>
let provider, signer, myAddress;
const USDC_ADDRESS = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"; 
const USDC_ABI = [
    "function balanceOf(address) view returns (uint256)",
    "function decimals() view returns (uint8)"
];

async function connectWallet() {
    if (window.ethereum) {
        try {
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            myAddress = accounts[0];
            document.getElementById('walletAddr').innerText = "Connected: " + myAddress.substring(0,6) + "...";
            document.getElementById('connectBtn').innerText = "Wallet Linked";
            updateMyBalance();
        } catch (e) { alert("Connection failed"); }
    } else { alert("MetaMask install karein"); }
}

async function updateMyBalance() {
    if (!signer || !myAddress) return;
    try {
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, provider);
        const [bal, dec] = await Promise.all([contract.balanceOf(myAddress), contract.decimals()]);
        const formatted = ethers.formatUnits(bal, dec);
        document.getElementById('myBalance').innerText = parseFloat(formatted).toFixed(4) + " USDC";
    } catch (e) { console.error(e); }
}

async function executeSwap() {
    const amt = document.getElementById('swapAmt').value;
    const status = document.getElementById('swapStatus');
    if(!amt || !signer) return alert("Pehle wallet connect karein");

    status.style.display = 'block';
    status.innerText = "Processing swap on Arc Network...";
    
    setTimeout(() => {
        status.innerHTML = "✅ Swap Successful! <br> Received: " + (amt * 0.92) + " EURC";
        updateMyBalance();
    }, 3000);
}
</script>
</body>
</html>
