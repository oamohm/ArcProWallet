<script>

let provider;
let signer;
let userAddress;

const USDC_ADDRESS =
"0xaf88d065e77c8cc2239327c5edb3a432268e5831";

const USDC_ABI = [

"function balanceOf(address owner) view returns (uint256)",

"function transfer(address to,uint amount) returns (bool)",

"function decimals() view returns (uint8)"

];

async function connectWallet(){

try{

if(!window.ethereum){

alert("Install Brave Wallet or MetaMask");

return;

}

await ethereum.request({
method:"eth_requestAccounts"
});

provider =
new ethers.providers.Web3Provider(
window.ethereum
);

signer =
provider.getSigner();

userAddress =
await signer.getAddress();

document.getElementById(
"connectBtn"
).innerHTML =
userAddress.slice(0,6) +
"..." +
userAddress.slice(-4);

document.getElementById(
"connectBtn"
).style.background =
"#22c55e";

document.getElementById(
"walletAddress"
).innerHTML =
userAddress;

loadUSDCBalance();

}catch(err){

console.log(err);

alert("Wallet Connection Failed");

}

}

async function loadUSDCBalance(){

try{

const contract =
new ethers.Contract(
USDC_ADDRESS,
USDC_ABI,
provider
);

const decimals =
await contract.decimals();

const rawBalance =
await contract.balanceOf(
userAddress
);

const formatted =
ethers.utils.formatUnits(
rawBalance,
decimals
);

document.getElementById(
"balanceDisplay"
).innerHTML =
Number(formatted).toFixed(2) +
" USDC";

document.getElementById(
"networkStatus"
).innerHTML =
"Connected";

}catch(err){

console.log(err);

document.getElementById(
"balanceDisplay"
).innerHTML =
"0.00 USDC";

}

}

async function sendTransaction(){

try{

const recipient =
document.getElementById(
"recipient"
).value.trim();

const amount =
document.getElementById(
"amount"
).value.trim();

if(!ethers.utils.isAddress(recipient)){

alert("Invalid Wallet Address");

return;

}

if(Number(amount) <= 0){

alert("Invalid Amount");

return;

}

document.getElementById(
"status"
).innerHTML =
"Waiting For Wallet Confirmation...";

const contract =
new ethers.Contract(
USDC_ADDRESS,
USDC_ABI,
signer
);

const decimals =
await contract.decimals();

const tx =
await contract.transfer(

recipient,

ethers.utils.parseUnits(
amount,
decimals
)

);

document.getElementById(
"status"
).innerHTML =
"Transaction Pending...";

addTransaction(
amount,
recipient,
"pending",
tx.hash
);

await tx.wait();

document.getElementById(
"status"
).innerHTML =
"USDC Sent Successfully";

addTransaction(
amount,
recipient,
"success",
tx.hash
);

loadUSDCBalance();

}catch(err){

console.log(err);

document.getElementById(
"status"
).innerHTML =
"Transaction Failed";

addTransaction(
"0",
"failed",
"failed",
""
);

}

}

function addTransaction(
amount,
recipient,
status,
hash
){

const div =
document.createElement("div");

div.className = "tx";

if(status === "success"){

div.innerHTML =
`
<div class="success">
✓ ${amount} USDC Sent
</div>

<div style="margin-top:6px;">
${recipient.slice(0,10)}...
</div>

<div style="margin-top:6px;font-size:12px;color:#8ea2ff;">
${hash.slice(0,18)}...
</div>
`;

}else if(status === "pending"){

div.innerHTML =
`
<div style="color:#facc15;">
⏳ Pending Transaction
</div>

<div style="margin-top:6px;">
${recipient.slice(0,10)}...
</div>
`;

}else{

div.innerHTML =
`
<div class="failed">
✕ Transaction Failed
</div>
`;

}

document.getElementById(
"txHistory"
).prepend(div);

}

</script>
