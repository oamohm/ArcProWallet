<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ArcPro Wallet</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root{
--bg:#04070d;
--card:rgba(18,24,38,0.82);
--border:rgba(255,255,255,0.06);
--primary:#3b82f6;
--green:#10b981;
--red:#ef4444;
--text:#f8fafc;
--muted:#94a3b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(to bottom,#04070d,#09111f);
font-family:'Inter',sans-serif;
color:var(--text);
padding:18px;
display:flex;
justify-content:center;
min-height:100vh;
}

.app{
width:100%;
max-width:460px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.logo{
font-size:30px;
font-weight:800;
letter-spacing:-1px;
}

.logo span{
color:var(--primary);
font-weight:300;
}

.connect{
background:var(--primary);
border:none;
padding:12px 18px;
border-radius:14px;
color:white;
font-weight:700;
cursor:pointer;
}

.card{
background:var(--card);
backdrop-filter:blur(18px);
border:1px solid var(--border);
border-radius:28px;
padding:22px;
margin-bottom:16px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

.balanceLabel{
font-size:12px;
color:var(--muted);
letter-spacing:1px;
text-transform:uppercase;
text-align:center;
}

.balance{
font-size:52px;
font-weight:800;
text-align:center;
margin-top:6px;
}

.address{
text-align:center;
font-size:12px;
color:var(--green);
margin-top:12px;
word-break:break-word;
}

.status{
text-align:center;
margin-top:10px;
font-size:13px;
color:var(--muted);
}

.tabs{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:16px;
}

.tab{
background:#111827;
border:none;
padding:13px 8px;
border-radius:16px;
color:var(--muted);
font-size:12px;
cursor:pointer;
}

.active{
background:var(--primary);
color:white;
}

.input{
width:100%;
padding:18px;
margin-top:12px;
background:#020617;
border:1px solid #1e293b;
border-radius:18px;
color:white;
font-size:15px;
outline:none;
}

.actionBtn{
width:100%;
padding:18px;
margin-top:18px;
border:none;
border-radius:18px;
background:var(--primary);
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
}

.ledger{
max-height:320px;
overflow:auto;
}

.tx{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.txLeft{
display:flex;
align-items:center;
gap:12px;
}

.txIcon{
width:42px;
height:42px;
border-radius:14px;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
}

.sent{
background:rgba(239,68,68,0.12);
color:var(--red);
}

.received{
background:rgba(16,185,129,0.12);
color:var(--green);
}

.txTitle{
font-size:14px;
font-weight:700;
}

.txHash{
font-size:11px;
color:var(--muted);
margin-top:4px;
}

.txAmount{
font-size:15px;
font-weight:700;
}

.minus{
color:var(--red);
}

.plus{
color:var(--green);
}

.footer{
text-align:center;
font-size:12px;
color:#64748b;
padding:10px 0 30px;
}

</style>

</head>

<body>

<div class="app">

<div class="header">

<div class="logo">
ARC<span>PRO</span>
</div>

<button
class="connect"
id="connectBtn"
onclick="connectWallet()">
Connect
</button>

</div>

<div class="card">

<div class="balanceLabel">
Total Balance
</div>

<div
class="balance"
id="balance">
0.0000
</div>

<div
class="address"
id="walletAddress">
Wallet Not Connected
</div>

<div
class="status"
id="networkStatus">
Arc Testnet Offline
</div>

</div>

<div class="tabs">

<button class="tab active">
Send
</button>

<button class="tab">
Swap
</button>

<button class="tab">
Pool
</button>

<button class="tab">
Bridge
</button>

</div>

<div class="card">

<div style="font-size:13px;color:var(--muted);margin-bottom:10px;">
Settlement Router
</div>

<input
class="input"
id="recipient"
placeholder="Recipient Address">

<input
class="input"
id="amount"
type="number"
placeholder="Amount">

<button
class="actionBtn"
onclick="sendTransaction()">
Process Transfer
</button>

<div
class="status"
id="txStatus">
Waiting for initialization
</div>

</div>

<div class="card">

<div style="font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;">
LIVE LEDGER
</div>

<div
class="ledger"
id="ledger">
</div>

</div>

<div class="footer">
Built by @Bhupendrxsingh
</div>

</div>

<script>

let provider;
let signer;
let userAddress;

async function connectWallet(){

try{

if(!window.ethereum){

alert("Install MetaMask");

return;

}

provider =
new ethers.BrowserProvider(window.ethereum);

await provider.send(
"eth_requestAccounts",
[]
);

signer =
await provider.getSigner();

userAddress =
await signer.getAddress();

document.getElementById(
"connectBtn"
).innerText = "Connected";

document.getElementById(
"walletAddress"
).innerText =
userAddress.slice(0,10) +
"..." +
userAddress.slice(-8);

document.getElementById(
"networkStatus"
).innerText =
"Arc Testnet Active";

loadBalance();

}catch(err){

console.log(err);

}

}

async function loadBalance(){

try{

const balance =
await provider.getBalance(
userAddress
);

document.getElementById(
"balance"
).innerText =
parseFloat(
ethers.formatEther(balance)
).toFixed(4);

}catch(err){

console.log(err);

}

}

async function sendTransaction(){

try{

if(!signer){

alert("Connect Wallet First");

return;

}

const recipient =
document.getElementById(
"recipient"
).value.trim();

const amount =
document.getElementById(
"amount"
).value.trim();

if(!recipient || !amount){

alert("Fill all fields");

return;

}

document.getElementById(
"txStatus"
).innerText =
"Waiting for wallet confirmation...";

const tx =
await signer.sendTransaction({

to: recipient,

value:
ethers.parseEther(amount)

});

addTransaction(
"sent",
amount,
tx.hash
);

document.getElementById(
"txStatus"
).innerText =
"Transaction Pending...";

await tx.wait();

document.getElementById(
"txStatus"
).innerText =
"Settlement Finalized";

loadBalance();

}catch(err){

console.log(err);

document.getElementById(
"txStatus"
).innerText =
"Transaction Failed";

}

}

function addTransaction(
type,
amount,
hash
){

const ledger =
document.getElementById(
"ledger"
);

const item =
document.createElement("div");

item.className = "tx";

item.innerHTML = `

<div class="txLeft">

<div class="txIcon ${type === 'sent' ? 'sent' : 'received'}">
${type === 'sent' ? '↗' : '↘'}
</div>

<div>

<div class="txTitle">
${type === 'sent' ? 'Transfer Sent' : 'Transfer Received'}
</div>

<div class="txHash">
${hash.slice(0,16)}...
</div>

</div>

</div>

<div class="txAmount ${type === 'sent' ? 'minus' : 'plus'}">

${type === 'sent' ? '-' : '+'}${amount}

</div>

`;

ledger.prepend(item);

}

</script>

</body>

</html>
