<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcPro Unified</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 15px; max-width: 450px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #334155; }
        .balance-value { font-size: 2.5em; font-weight: 800; color: white; text-align: center; margin: 10px 0; }
        button { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .status { font-size: 0.8em; color: #10b981; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0; color: var(--blue);">ArcPro</h2>
        <button id="connectBtn" onclick="connectWallet()" style="width: auto; padding: 8px 15px;">Connect</button>
    </div>

    <div class="card">
        <p style="text-align: center; color: #94a3b8; margin: 0;">Main Balance</p>
        <div class="balance-value" id="myBalance">0.00</div>
        <p id="walletAddr" class="status">Offline</p>
    </div>

    <div class="card">
        <input type="text" id="toAddr" placeholder="Recipient Address">
        <input type="number" id="sendAmt" placeholder="Amount">
        <button onclick="sendUSDC()">Send USDC</button>
    </div>

<script>
let provider, signer, myAddress;
const RPC_URL = "https://rpc.arc.network"; // ensure this is your correct testnet rpc
const USDC_ADDRESS = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174"; 
const USDC_ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)", "function transfer(address, uint256) returns (bool)"];

// auto-load balance using rpc even before connecting
async function loadStaticBalance() {
    try {
        const staticProv = new ethers.JsonRpcProvider(RPC_URL);
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, staticProv);
        // replacing with your known address for testing if needed, or wait for connect
    } catch (e) { console.log("rpc load failed"); }
}

async function connectWallet() {
    if (window.ethereum) {
        provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        myAddress = accounts[0];
        document.getElementById('walletAddr').innerText = myAddress;
        updateBalance();
    } else { alert("use metamask browser"); }
}

async function updateBalance() {
    const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, provider);
    const [bal, dec] = await Promise.all([contract.balanceOf(myAddress), contract.decimals()]);
    document.getElementById('myBalance').innerText = ethers.formatUnits(bal, dec) + " USDC";
}

async function sendUSDC() {
    const to = document.getElementById('toAddr').value;
    const amt = document.getElementById('sendAmt').value;
    if(!signer) return alert("connect first");
    try {
        const contract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, signer);
        const tx = await contract.transfer(to, ethers.parseUnits(amt.toString(), 6));
        await tx.wait();
        updateBalance();
    } catch (e) { alert("failed"); }
}
loadStaticBalance();
</script>
</body>
</html>
