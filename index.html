<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ArcPro Wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<style>

body{
background:#050816;
color:white;
font-family:Arial;
padding:20px;
}

.card{
max-width:420px;
margin:auto;
background:#0b1222;
padding:20px;
border-radius:20px;
border:1px solid #1d2a52;
margin-top:20px;
}

.title{
font-size:28px;
font-weight:bold;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#3154ff;
color:white;
font-size:16px;
cursor:pointer;
}

input{
width:100%;
padding:15px;
margin-top:12px;
border-radius:12px;
border:1px solid #22345f;
background:#09101d;
color:white;
}

.balance{
font-size:30px;
margin-top:20px;
color:#00ff9d;
}

.small{
margin-top:10px;
font-size:14px;
color:#8ca0ff;
word-break:break-word;
}

#confirmBox{
display:none;
margin-top:20px;
padding:15px;
background:#101a31;
border-radius:12px;
}

.row{
display:flex;
gap:10px;
}

.cancel{
background:#2c3550;
}

.confirm{
background:#00a86b;
}

.status{
margin-top:15px;
font-size:14px;
word-break:break-word;
color:#9db0ff;
}

</style>

</head>

<body>

<div class="card">

<div class="title">
ArcPro Wallet
</div>

<button onclick="connectWallet()">
Connect Wallet
</button>

<div class="small"
id="wallet">
Wallet Not Connected
</div>

<div class="small"
id="network">
Network: Disconnected
</div>

<div class="balance"
id="balance">
0.0000 ETH
</div>

</div>

<div class="card">

<h3>Send Transaction</h3>

<input
id="recipient"
placeholder="Recipient Address">

<input
id="amount"
placeholder="Amount">

<button onclick="prepareSend()">
Continue
</button>

<div id="confirmBox">

<div id="confirmText"></div>

<div class="row">

<button
class="cancel"
onclick="cancelSend()">
Cancel
</button>

<button
class="confirm"
onclick="sendTransaction()">
Confirm
</button>

</div>

</div>

<div class="status"
id="status"></div>

</div>

<script>

let provider;
let signer;
let userAddress;

async function connectWallet(){

try{

if(!window.ethereum){

alert("Install MetaMask");

return;

}

await window.ethereum.request({
method:"eth_requestAccounts"
});

provider =
new ethers.BrowserProvider(window.ethereum);

signer =
await provider.getSigner();

userAddress =
await signer.getAddress();

document.getElementById(
"wallet"
).innerHTML =
"Wallet: " +
userAddress.substring(0,8) +
"..." +
userAddress.slice(-6);

const network =
await provider.getNetwork();

document.getElementById(
"network"
).innerHTML =
"Network: " + network.name;

loadBalance();

}catch(err){

console.log(err);

alert("Connection Failed");

}

}

async function loadBalance(){

try{

const balanceWei =
await provider.getBalance(userAddress);

const balanceEth =
ethers.formatEther(balanceWei);

document.getElementById(
"balance"
).innerHTML =
Number(balanceEth).toFixed(4) +
" ETH";

}catch(err){

console.log(err);

}

}

function prepareSend(){

const recipient =
document.getElementById(
"recipient"
).value.trim();

const amount =
document.getElementById(
"amount"
).value.trim();

if(!recipient || !amount){

alert("Fill All Fields");

return;

}

document.getElementById(
"confirmBox"
).style.display = "block";

document.getElementById(
"confirmText"
).innerHTML =
`
Send ${amount} ETH
<br><br>
To:
<br>
${recipient}
`;

}

function cancelSend(){

document.getElementById(
"confirmBox"
).style.display = "none";

}

async function sendTransaction(){

try{

const recipient =
document.getElementById(
"recipient"
).value.trim();

const amount =
document.getElementById(
"amount"
).value.trim();

if(!ethers.isAddress(recipient)){

alert("Invalid Address");

return;

}

const value =
ethers.parseEther(amount);

const balance =
await provider.getBalance(userAddress);

const gasReserve =
ethers.parseEther("0.0005");

if(balance < value + gasReserve){

document.getElementById(
"status"
).innerHTML =
"Low Balance For Gas Fee";

return;

}

document.getElementById(
"status"
).innerHTML =
"Waiting For Wallet Confirmation...";

const tx =
await signer.sendTransaction({

to: recipient,

value: value,
gasLimit: 21000

});

document.getElementById(
"status"
).innerHTML =
"Transaction Pending...";

await tx.wait();

document.getElementById(
"status"
).innerHTML =
"Transaction Successful";

loadBalance();

document.getElementById(
"confirmBox"
).style.display = "none";

}catch(err){

console.log(err);

document.getElementById(
"status"
).innerHTML =
"Transaction Rejected Or Failed";

}

}

</script>

</body>
</html>
