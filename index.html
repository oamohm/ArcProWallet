<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArcPro | Universal Router</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #3b82f6; --bg: #01040a; --s: #0f172a; --glass: rgba(15, 23, 42, 0.9); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; /* Scroll band karne ke liye */
            display: flex;
            justify-content: center;
        }

        .app-shell {
            width: 100%;
            max-width: 430px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #01040a 100%);
        }

        /* Fixed Header */
        .hdr { padding: 50px 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 1.4em; letter-spacing: -1px; }
        .status { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); padding: 6px 12px; border-radius: 20px; font-size: 0.6em; font-weight: 800; display: flex; align-items: center; gap: 6px; }

        /* Centered Balance */
        .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateY(-30px); }
        .bal-lbl { color: #64748b; font-size: 0.7em; font-weight: 700; letter-spacing: 2px; margin-bottom: 5px; }
        .bal-val { font-size: 4.2em; font-weight: 800; letter-spacing: -2px; }

        /* Floating Interactive Sheet (Pawan Style) */
        .sheet { 
            background: var(--glass); 
            border-top: 1px solid rgba(255,255,255,0.08); 
            border-radius: 40px 40px 0 0; 
            padding: 30px 25px 140px; /* Space for Nav */
            backdrop-filter: blur(30px);
            margin-top: auto;
        }

        .title { font-size: 0.9em; font-weight: 800; color: var(--p); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        
        .input-box { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); padding: 18px; border-radius: 22px; margin-bottom: 12px; }
        .input-box label { display: block; font-size: 0.55em; color: #475569; font-weight: 800; margin-bottom: 6px; }
        input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 1.1em; font-weight: 600; }
        
        .btn { background: var(--p); color: white; border: none; width: 100%; padding: 20px; border-radius: 24px; font-weight: 800; font-size: 1em; cursor: pointer; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3); }

        /* Nav Bar - Bottom Fixed */
        .nav { 
            position: absolute; 
            bottom: 30px; 
            left: 20px; 
            right: 20px; 
            height: 85px; 
            background: rgba(10, 15, 26, 0.9); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 32px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .tab { color: #475569; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: 0.3s; width: 25%; }
        .tab.active { color: var(--p); }
        .tab i { font-size: 1.4em; }
        .tab span { font-size: 0.55em; font-weight: 800; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="hdr">
        <div class="logo">ARC<span style="opacity:0.4;">PRO</span></div>
        <div class="status"><i class="fas fa-circle" style="font-size:0.5em;"></i> NODE ONLINE</div>
    </div>

    <div class="hero">
        <div class="bal-lbl">SETTLEMENT ASSETS</div>
        <div class="bal-val" id="bal">1.00</div>
        <div style="font-size:0.65em; color:var(--p); margin-top:10px; font-family:monospace;" id="addr" onclick="conn()">Link Arc Node</div>
    </div>

    <div class="sheet">
        <div id="v-router">
            <div class="title"><i class="fas fa-bolt"></i> NATIVE ROUTER</div>
            <div class="input-box"><label>DESTINATION NODE</label><input type="text" placeholder="0x..." id="to"></div>
            <div class="input-box"><label>VOLUME (USDC)</label><input type="number" placeholder="0.00" id="v"></div>
            <button class="btn" onclick="run()">Initiate Route</button>
        </div>

        <div id="v-security" class="hidden">
            <div class="title"><i class="fas fa-shield-halved"></i> SECURITY VAULT</div>
            <div class="input-box" onclick="alert('Recovery Key: Alpha Bravo...')">
                <label>ENCRYPTED SEED</label>
                <div style="font-size:0.95em; font-weight:700;">Reveal Recovery Phrase</div>
            </div>
            <div class="input-box">
                <label>NODE STATUS</label>
                <div style="font-size:0.95em; font-weight:700; color:var(--p);">Integrity Verified</div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="tab active" onclick="sw('router')"><i class="fas fa-route"></i><span>ROUTER</span></div>
        <div class="tab" onclick="sw('swap')"><i class="fas fa-arrows-rotate"></i><span>SWAP</span></div>
        <div class="tab" onclick="sw('security')"><i class="fas fa-lock"></i><span>SECURITY</span></div>
        <div class="tab" onclick="sw('config')"><i class="fas fa-gear"></i><span>CONFIG</span></div>
    </div>
</div>

<script>
    let p, a;
    async function conn() {
        if (!window.ethereum) return;
        p = new ethers.BrowserProvider(window.ethereum);
        const ac = await p.send("eth_requestAccounts", []);
        a = ac[0];
        document.getElementById('addr').innerText = a.slice(0,6)+'...'+a.slice(-4);
        sync();
    }
    async function sync() {
        try {
            const c = new ethers.Contract("0x2e1e07505F0376D41865A7E1C8A49c95d97F259B", ["function balanceOf(address) view returns (uint256)"], p);
            const b = await c.balanceOf(a);
            document.getElementById('bal').innerText = ethers.formatUnits(b, 6);
        } catch(e) { document.getElementById('bal').innerText = "1.00"; }
    }
    function sw(n) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('v-router').classList.toggle('hidden', n !== 'router');
        document.getElementById('v-security').classList.toggle('hidden', n !== 'security');
    }
    function run() { alert("Coordinating Arc Node..."); }
    if(window.ethereum?.selectedAddress) conn();
</script>
</body>
</html>
